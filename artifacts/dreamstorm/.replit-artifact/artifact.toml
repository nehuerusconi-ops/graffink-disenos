kind = "web"
previewPath = "/"
title = "Dreamstorm - Diseños DTF"
version = "1.0.0"
id = "artifacts/dreamstorm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19283

[services.development]
run = "pnpm --filter @workspace/dreamstorm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dreamstorm", "run", "build" ]
publicDir = "artifacts/dreamstorm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19283"
BASE_PATH = "/"
