openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog operations
  - name: storage
    description: Object storage operations
  - name: orders
    description: Sales orders and invoicing
  - name: payments
    description: Payment gateway integrations (Mercado Pago, PayPal, Ualá Bis)
  - name: settings
    description: Editable app-level settings (e.g. plancha grouping price)
  - name: security
    description: Security audit logs (admin-only)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (admin)
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create manual order (admin-only — requireAdmin)
      description: >
        Reserved for admin manual order entry. Real customer orders must go through
        /payments/mercadopago/preference or /payments/paypal/create-order and are
        confirmed by the gateway before being marked paid.
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — not in admin allowlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/stats:
    get:
      operationId: getOrderStats
      tags: [orders]
      summary: Aggregate sales metrics (admin)
      responses:
        "200":
          description: Aggregated stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order detail (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                size:
                  type: integer
                contentType:
                  type: string
              required:
                - name
                - size
                - contentType
      responses:
        "200":
          description: Presigned URL granted
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadURL:
                    type: string
                  objectPath:
                    type: string
                required:
                  - uploadURL
                  - objectPath
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/mercadopago/preference:
    post:
      operationId: createMercadoPagoPreference
      tags: [payments]
      summary: Create Mercado Pago Checkout Pro preference
      description: >
        Resolves product prices server-side from productId+quantity, creates a pending order,
        and returns a Mercado Pago init_point URL. Cart only shows productId and quantity —
        prices are never trusted from client input.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Preference created
          content:
            application/json:
              schema:
                type: object
                properties:
                  init_point:
                    type: string
                  sandbox_init_point:
                    type: string
                  orderId:
                    type: string
                required: [init_point, orderId]
        "422":
          description: Unknown or unpublished product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Gateway error

  /payments/paypal/create-order:
    post:
      operationId: createPaypalOrder
      tags: [payments]
      summary: Create PayPal order (inline SDK)
      description: >
        Resolves product prices server-side, creates a pending order, and returns a PayPal
        order ID for use with the PayPal JS SDK buttons. Requires PAYPAL_ARS_USD_RATE env var.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: PayPal order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ppOrderId:
                    type: string
                  orderId:
                    type: string
                required: [ppOrderId, orderId]
        "503":
          description: Exchange rate not configured

  /payments/paypal/capture-order:
    post:
      operationId: capturePaypalOrder
      tags: [payments]
      summary: Capture PayPal order after buyer approval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ppOrderId:
                  type: string
                orderId:
                  type: string
              required: [ppOrderId, orderId]
      responses:
        "200":
          description: Order captured and marked paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Mismatch or capture failure

  /payments/uala/link:
    post:
      operationId: getUalaLink
      tags: [payments]
      summary: Get Ualá Bis payment link for manual payment
      responses:
        "200":
          description: Ualá payment link
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                required: [url]
        "503":
          description: Ualá link not configured

  /orders/{id}/invoice:
    get:
      operationId: getOrderInvoice
      tags: [orders]
      summary: Get invoice number for a confirmed order (public)
      description: >
        Returns only the invoiceNumber for a paid order. Safe to expose publicly —
        orderId is a UUID from MP external_reference and no sensitive data is returned.
        Used by checkout/success to show invoice number after MP redirect.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice number
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoiceNumber:
                    type: integer
                required: [invoiceNumber]
        "404":
          description: Order not found or not paid

  /settings:
    get:
      operationId: getAppSettings
      tags: [settings]
      summary: Public app settings (e.g. plancha grouping price)
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    patch:
      operationId: updateAppSettings
      tags: [settings]
      summary: Update editable app settings (admin)
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /security/webhook-events:
    get:
      operationId: listWebhookSecurityEvents
      tags: [security]
      summary: List rejected webhook attempts (admin)
      description: >
        Returns up to 500 of the most recent rejected webhook attempts
        (e.g. invalid Mercado Pago signature) for review in the admin panel.
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookSecurityEvent"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — not in admin allowlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/mercadopago:
    post:
      operationId: mercadoPagoWebhook
      tags: [payments]
      summary: Mercado Pago IPN webhook (server-to-server)
      description: >
        Receives Mercado Pago payment notifications, re-validates payment status via MP API,
        verifies amount against order total, and marks order as paid + triggers email delivery.
      responses:
        "200":
          description: Acknowledged

components:
  schemas:
    CheckoutInput:
      type: object
      properties:
        customerName:
          type: string
          minLength: 1
        customerEmail:
          type: string
          format: email
        customerDni:
          type: string
          nullable: true
          description: DNI o CUIT del comprador (opcional, sólo dígitos, 7-11 caracteres)
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: object
            properties:
              productId:
                type: string
              quantity:
                type: integer
                minimum: 1
                maximum: 50
            required: [productId, quantity]
        groupAsPlancha:
          type: boolean
          description: Si es true, se agrega al total un cargo único por el servicio "Armar plancha" (precio configurado en /settings) además de cobrar cada diseño a su precio normal.
      required: [customerName, customerEmail, items]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AppSettings:
      type: object
      properties:
        planchaGroupingPrice:
          type: integer
          minimum: 0
          description: Precio en ARS del servicio "Armar plancha". Se SUMA al subtotal de los diseños cuando el cliente activa la opción en el carrito; no reemplaza el total.
      required: [planchaGroupingPrice]

    AppSettingsInput:
      type: object
      properties:
        planchaGroupingPrice:
          type: integer
          minimum: 0
      required: [planchaGroupingPrice]

    ProductSpec:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
      required: [key, value]

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        price:
          type: integer
        imagePath:
          type: string
        filePath:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        specifications:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        isBestSeller:
          type: boolean
        isPublished:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - category
        - price
        - imagePath
        - filePath
        - description
        - specifications
        - isBestSeller
        - isPublished
        - createdAt
        - updatedAt

    ProductInput:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        price:
          type: integer
          minimum: 0
        imagePath:
          type: string
        filePath:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        specifications:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        isBestSeller:
          type: boolean
        isPublished:
          type: boolean
      required:
        - id
        - name
        - category
        - price
        - imagePath

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        price:
          type: integer
          minimum: 0
        imagePath:
          type: string
        filePath:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        specifications:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        isBestSeller:
          type: boolean
        isPublished:
          type: boolean

    OrderItem:
      type: object
      properties:
        productId:
          type: string
        name:
          type: string
        price:
          type: integer
        quantity:
          type: integer
        imagePath:
          type: string
      required:
        - productId
        - name
        - price
        - quantity
        - imagePath

    Order:
      type: object
      properties:
        id:
          type: string
        invoiceNumber:
          type: integer
        customerName:
          type: string
        customerEmail:
          type: string
        customerDni:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total:
          type: integer
        isPlanchaGrouped:
          type: boolean
        paymentMethod:
          type: string
          enum: [mercadopago, uala, paypal]
        status:
          type: string
          enum: [pending, paid, failed, refunded]
        confirmationSource:
          type: string
          enum: [webhook, manual, paypal-capture]
          nullable: true
        arsToUsdRate:
          type: string
          nullable: true
          description: |
            ARS→USD exchange rate that was applied at the moment a PayPal
            order was created. Stored as a decimal string (e.g. "1185.5000")
            for audit purposes. Null for non-PayPal orders or for orders
            created before this field existed.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - invoiceNumber
        - customerName
        - customerEmail
        - items
        - total
        - isPlanchaGrouped
        - paymentMethod
        - status
        - createdAt

    OrderInput:
      type: object
      properties:
        customerName:
          type: string
          minLength: 1
        customerEmail:
          type: string
          format: email
        customerDni:
          type: string
          nullable: true
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderItem"
        paymentMethod:
          type: string
          enum: [mercadopago, uala, paypal]
      required:
        - customerName
        - customerEmail
        - items
        - paymentMethod

    OrderStats:
      type: object
      properties:
        totalRevenue:
          type: integer
        totalOrders:
          type: integer
        revenueToday:
          type: integer
        revenueThisWeek:
          type: integer
        revenueThisMonth:
          type: integer
        ordersToday:
          type: integer
        revenueByDay:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              revenue:
                type: integer
              orders:
                type: integer
            required: [date, revenue, orders]
        topProducts:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
              name:
                type: string
              quantity:
                type: integer
              revenue:
                type: integer
            required: [productId, name, quantity, revenue]
        revenueByMethod:
          type: array
          items:
            type: object
            properties:
              method:
                type: string
              revenue:
                type: integer
              orders:
                type: integer
            required: [method, revenue, orders]
      required:
        - totalRevenue
        - totalOrders
        - revenueToday
        - revenueThisWeek
        - revenueThisMonth
        - ordersToday
        - revenueByDay
        - topProducts
        - revenueByMethod

    WebhookSecurityEvent:
      type: object
      properties:
        id:
          type: integer
        createdAt:
          type: string
          format: date-time
        source:
          type: string
          description: Webhook source (e.g. "mercadopago")
        reason:
          type: string
          description: Why the attempt was rejected (e.g. "invalid_signature")
        ip:
          type: string
          nullable: true
        xRequestId:
          type: string
          nullable: true
        signatureTs:
          type: string
          nullable: true
          description: Timestamp parsed from the x-signature header
        detail:
          type: string
          nullable: true
          description: Extra context (e.g. data.id sent with the rejected request)
      required:
        - id
        - createdAt
        - source
        - reason
        - ip
        - xRequestId
        - signatureTs
        - detail
